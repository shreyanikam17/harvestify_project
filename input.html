<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Enter Farm Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef7ee;
            padding: 30px;
        }
        
        form {
            background: white;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        
        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        
        button {
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
        
        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>
    <h2 style="text-align: center">Enter Soil & Weather Details</h2>
    <form onsubmit="saveData(event)">
        <label>Nitrogen (mg/kg):</label>
        <input type="number" id="nitrogen" required />

        <label>Phosphorus (mg/kg):</label>
        <input type="number" id="phosphorus" required />

        <label>Potassium (mg/kg):</label>
        <input type="number" id="potassium" required />

        <label>Temperature (°C):</label>
        <input type="number" id="temp" required />

        <label>Humidity (%):</label>
        <input type="number" id="humidity" required />

        <button type="submit">Submit</button>
    </form>

    <script>
        function saveData(event) {
            event.preventDefault();
            let data = {
                N: document.getElementById("nitrogen").value,
                P: document.getElementById("phosphorus").value,
                K: document.getElementById("potassium").value,
                Temp: document.getElementById("temp").value,
                Humidity: document.getElementById("humidity").value,
            };
            localStorage.setItem("farmData", JSON.stringify(data));
            window.location.href = "result.html";
        }
    </script>
</body>

</html>
